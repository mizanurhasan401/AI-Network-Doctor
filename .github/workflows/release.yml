name: Build installers

# Builds the desktop installers on each platform's NATIVE runner — electron-builder
# can only reliably target the host OS, so a macOS dev cannot cross-build a Windows
# .exe or Linux packages locally. Push a v* tag to also publish a GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos-dmg
          - os: windows-latest
            artifact: windows-setup
          - os: ubuntu-latest
            artifact: linux-appimage-deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Builds (typecheck + bundle) then packages for the host OS. The npm script
      # already runs `npm run build` first; electron-builder reads electron-builder.yml.
      - name: Package
        run: npm run package
        env:
          # Don't fail the unsigned build on missing signing identities.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          fail_on_unmatched_files: false
