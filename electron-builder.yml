appId: ai.netdoctor.app
productName: NetDoctor AI
copyright: Copyright © 2026 NetDoctor AI
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# Ship the resources/ folder (Bangla PDF font, etc.) into the packaged app at
# Contents/Resources/resources — exactly where src/main/core/resources.ts resolves
# it via process.resourcesPath. (A files-allowlist excludes resources/ from the
# asar, so an asarUnpack rule alone would never ship it.)
extraResources:
  - from: resources
    to: resources
    filter: ['**/*']
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.utilities
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Network
  artifactName: ${productName}-${version}.${ext}
