appId: ai.netdoctor.app
productName: NetDoctor AI
copyright: Copyright © 2026 NetDoctor AI
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Network
  artifactName: ${productName}-${version}.${ext}
